<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">RunwayOps Architecture Diagram</title>
  <desc id="desc">Architecture diagram for RunwayOps showing Vercel Next.js, AWS Aurora PostgreSQL, Amazon S3, deterministic finance, agent orchestration, Fireworks, LangSmith, Twilio, Gmail, and the approval gated memory loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070A14"/>
      <stop offset="0.48" stop-color="#10132A"/>
      <stop offset="1" stop-color="#050A11"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6D5DFF"/>
      <stop offset="1" stop-color="#29E6A7"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0F1724"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrowGreen" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M1,1 L11,6.5 L1,12 Z" fill="#29E6A7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M1,1 L11,6.5 L1,12 Z" fill="#8D7DFF"/>
    </marker>
    <marker id="arrowAmber" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M1,1 L11,6.5 L1,12 Z" fill="#F9B233"/>
    </marker>
    <style>
      .title { font: 800 56px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .subtitle { font: 500 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #A7B0C3; letter-spacing: 0; }
      .section { font: 800 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F7F8FF; letter-spacing: 0; }
      .label { font: 750 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F7F8FF; letter-spacing: 0; }
      .small { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B4BED1; letter-spacing: 0; }
      .micro { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B4BED1; letter-spacing: 0; }
      .tiny { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8390A8; letter-spacing: 0; }
      .note { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #D9E2F1; letter-spacing: 0; }
      .pill { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CFFCEF; letter-spacing: 0; }
      .box { fill: #141925; stroke: #30384D; stroke-width: 2; rx: 20; filter: url(#shadow); }
      .boxSoft { fill: #101622; stroke: #263149; stroke-width: 2; rx: 18; }
      .boxGreen { fill: #0B2722; stroke: #20D7A2; stroke-width: 2; rx: 18; }
      .boxPurple { fill: #17183D; stroke: #7E6CFF; stroke-width: 2; rx: 18; }
      .boxAmber { fill: #261E0E; stroke: #F9B233; stroke-width: 2; rx: 18; }
      .boxRed { fill: #2A1318; stroke: #FF6978; stroke-width: 2; rx: 18; }
      .lane { fill: rgba(255,255,255,0.03); stroke: #202A3D; stroke-width: 2; rx: 28; }
      .dash { stroke-dasharray: 9 10; }
      .lineGreen { stroke: #29E6A7; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .linePurple { stroke: #8D7DFF; stroke-width: 4; fill: none; marker-end: url(#arrowPurple); }
      .lineAmber { stroke: #F9B233; stroke-width: 4; fill: none; marker-end: url(#arrowAmber); }
      .lineSoft { stroke: #566079; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="1650" cy="120" r="340" fill="#533EFF" opacity="0.08"/>
  <circle cx="200" cy="1040" r="280" fill="#10D9A0" opacity="0.07"/>

  <text x="90" y="92" class="title">RunwayOps Architecture</text>
  <text x="92" y="134" class="subtitle">Agentic cashflow operating loop: deterministic finance, Aurora-backed truth, human approval, provider execution, and memory.</text>
  <rect x="1395" y="62" width="310" height="48" rx="24" fill="url(#hero)" opacity="0.95"/>
  <text x="1430" y="93" class="pill">H0 AWS + Vercel Submission</text>

  <!-- Lanes -->
  <rect x="70" y="190" width="410" height="840" class="lane"/>
  <text x="105" y="237" class="section">User Experience</text>

  <rect x="515" y="190" width="440" height="840" class="lane"/>
  <text x="550" y="237" class="section">Vercel Product Runtime</text>

  <rect x="990" y="190" width="450" height="840" class="lane"/>
  <text x="1025" y="237" class="section">AWS Data Backbone</text>

  <rect x="1475" y="190" width="255" height="840" class="lane"/>
  <text x="1510" y="237" class="section">Providers</text>

  <!-- User lane -->
  <rect x="105" y="285" width="340" height="122" class="boxPurple"/>
  <text x="135" y="329" class="label">SMB founder / operator</text>
  <text x="135" y="362" class="small">Uploads finance pack, reviews</text>
  <text x="135" y="388" class="small">risk, approves next action</text>

  <rect x="105" y="475" width="340" height="146" class="boxSoft"/>
  <text x="135" y="518" class="label">RunwayOps cockpit</text>
  <text x="135" y="551" class="small">Overview, Forecasts, Actions,</text>
  <text x="135" y="577" class="small">Customers, Agent Activity</text>
  <rect x="135" y="590" width="125" height="28" rx="14" fill="#172B48" stroke="#35537C"/>
  <text x="154" y="609" class="tiny">Vercel URL</text>

  <rect x="105" y="690" width="340" height="160" class="boxGreen"/>
  <text x="135" y="735" class="label">Human approval gate</text>
  <text x="135" y="768" class="small">Actions can be drafted and</text>
  <text x="135" y="794" class="small">prepared autonomously, but</text>
  <text x="135" y="820" class="small">execution requires approval.</text>

  <!-- Vercel lane -->
  <rect x="550" y="285" width="370" height="126" class="boxPurple"/>
  <text x="580" y="329" class="label">Next.js app on Vercel</text>
  <text x="580" y="362" class="small">Premium UI plus server routes</text>
  <text x="580" y="388" class="small">for product and agent flows</text>

  <rect x="550" y="470" width="370" height="158" class="boxSoft"/>
  <text x="580" y="514" class="label">API routes + repositories</text>
  <text x="580" y="547" class="small">Ingestion, forecasts, actions,</text>
  <text x="580" y="573" class="small">approvals, providers, memory,</text>
  <text x="580" y="599" class="small">activity timeline, webhooks</text>

  <rect x="550" y="690" width="370" height="188" class="boxAmber"/>
  <text x="580" y="734" class="label">Agent orchestration</text>
  <text x="580" y="767" class="small">LangGraph coordinates forecast,</text>
  <text x="580" y="793" class="small">memory, collections, and audit</text>
  <text x="580" y="819" class="small">agents with persisted checkpoints.</text>
  <rect x="580" y="840" width="128" height="28" rx="14" fill="#3A2B11" stroke="#F9B233"/>
  <text x="602" y="859" class="tiny">LangGraph</text>

  <rect x="550" y="928" width="370" height="70" class="boxGreen"/>
  <text x="580" y="971" class="label">Outcome learning loop</text>

  <!-- AWS lane -->
  <rect x="1025" y="285" width="380" height="156" class="boxGreen"/>
  <text x="1055" y="329" class="label">Amazon Aurora PostgreSQL</text>
  <text x="1055" y="362" class="small">Primary source of truth for</text>
  <text x="1055" y="388" class="small">finance, actions, approvals,</text>
  <text x="1055" y="414" class="small">provider logs, memory, audit.</text>

  <rect x="1025" y="493" width="168" height="112" class="boxSoft"/>
  <text x="1050" y="536" class="label">RDS Data API</text>
  <text x="1050" y="569" class="small">Serverless SQL</text>
  <text x="1050" y="593" class="small">from Vercel</text>

  <rect x="1228" y="493" width="177" height="112" class="boxSoft"/>
  <text x="1253" y="536" class="label">Amazon S3</text>
  <text x="1253" y="569" class="small">Source-file</text>
  <text x="1253" y="593" class="small">provenance</text>

  <rect x="1025" y="670" width="380" height="226" class="boxSoft"/>
  <text x="1055" y="714" class="label">Durable product state</text>
  <text x="1055" y="748" class="small">cash accounts, invoices, payments</text>
  <text x="1055" y="776" class="small">event inbox and event ledger</text>
  <text x="1055" y="804" class="small">forecast runs and points</text>
  <text x="1055" y="832" class="small">action plans and approvals</text>
  <text x="1055" y="860" class="small">pgvector memory and audit log</text>

  <rect x="1025" y="928" width="380" height="70" class="boxGreen"/>
  <text x="1055" y="971" class="label">Memory updated after outcome</text>

  <!-- Providers lane -->
  <rect x="1510" y="285" width="185" height="132" class="boxAmber"/>
  <text x="1538" y="329" class="label">Fireworks AI</text>
  <text x="1538" y="362" class="small">LangGraph calls</text>
  <text x="1538" y="388" class="small">drafts, extraction</text>

  <rect x="1510" y="455" width="185" height="118" class="boxSoft"/>
  <text x="1538" y="499" class="label">LangSmith</text>
  <text x="1538" y="532" class="small">LangGraph traces</text>
  <text x="1538" y="558" class="small">and evaluation</text>

  <rect x="1510" y="638" width="185" height="132" class="boxGreen"/>
  <text x="1538" y="682" class="label">Twilio</text>
  <text x="1538" y="715" class="small">Approved live</text>
  <text x="1538" y="741" class="small">test-call path</text>

  <rect x="1510" y="815" width="185" height="132" class="boxSoft"/>
  <text x="1538" y="859" class="label">Gmail</text>
  <text x="1538" y="892" class="small">OAuth-gated</text>
  <text x="1538" y="918" class="small">draft/send path</text>

  <!-- Core arrows -->
  <path d="M445 346 C490 346, 505 348, 550 348" class="linePurple"/>
  <path d="M735 411 L735 470" class="linePurple"/>
  <path d="M920 548 C955 548, 975 548, 1025 548" class="lineGreen"/>
  <path d="M920 512 C1015 455, 1135 455, 1228 520" class="lineGreen"/>
  <path d="M1115 493 L1115 441" class="lineGreen"/>
  <path d="M445 760 C495 760, 500 760, 550 760" class="lineAmber"/>
  <path d="M920 784 C965 784, 985 784, 1025 784" class="lineAmber"/>
  <path d="M445 760 C495 875, 470 955, 550 963" class="lineGreen"/>
  <path d="M920 963 C960 963, 985 963, 1025 963" class="lineGreen"/>
  <path d="M1405 963 C1460 963, 1477 881, 1510 881" class="lineGreen"/>
  <path d="M1510 704 C1466 704, 1445 704, 1405 704" class="lineGreen"/>
  <path d="M1510 881 C1466 881, 1445 881, 1405 881" class="lineGreen"/>
  <path d="M1025 346 C970 346, 955 530, 920 548" class="lineGreen dash"/>
  <path d="M920 963 C830 1028, 645 1030, 445 800" class="lineGreen dash"/>

  <!-- Deterministic finance callout -->
  <rect x="90" y="1060" width="500" height="86" rx="20" fill="#111827" stroke="#2D374D" stroke-width="2"/>
  <text x="122" y="1090" class="note">Deterministic layer owns the money</text>
  <text x="122" y="1118" class="micro">Runway, payroll risk, low points, and scenarios</text>
  <text x="122" y="1139" class="micro">are calculated from Aurora financial facts.</text>

  <rect x="650" y="1060" width="500" height="86" rx="20" fill="#111827" stroke="#2D374D" stroke-width="2"/>
  <text x="682" y="1090" class="note">Agentic layer owns judgment</text>
  <text x="682" y="1118" class="micro">Agents retrieve memory, rank actions, draft</text>
  <text x="682" y="1139" class="micro">outreach, explain risk, and learn outcomes.</text>

  <rect x="1210" y="1060" width="500" height="86" rx="20" fill="#111827" stroke="#2D374D" stroke-width="2"/>
  <text x="1242" y="1090" class="note">Provider layer executes only when gated</text>
  <text x="1242" y="1118" class="micro">Approval, live flags, credentials, and provider</text>
  <text x="1242" y="1139" class="micro">evidence protect the user from silent automation.</text>

  <!-- Legend -->
  <rect x="1188" y="70" width="150" height="38" rx="19" fill="#0B2722" stroke="#20D7A2"/>
  <text x="1210" y="95" class="tiny">AWS / truth</text>
  <rect x="1024" y="70" width="144" height="38" rx="19" fill="#17183D" stroke="#7E6CFF"/>
  <text x="1045" y="95" class="tiny">Product UI</text>
  <rect x="856" y="70" width="148" height="38" rx="19" fill="#261E0E" stroke="#F9B233"/>
  <text x="878" y="95" class="tiny">Agents / AI</text>
</svg>
